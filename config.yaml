# =============================================================================
# config.yaml — SHERLOCK crRNA Design Pipeline · v1.0
# ~/sherlock/config.yaml
#
# To adapt for a different organism:
#   1. Update [organism]
#   2. Update [download] anchors + chilean_strains
#   3. Update [classification] groups
# =============================================================================

# ---------------------------------------------------------------------------
# ORGANISM
# ---------------------------------------------------------------------------
organism:
  name:    "Clostridioides_difficile"
  display: "Clostridioides difficile"

# ---------------------------------------------------------------------------
# PATHS
# ---------------------------------------------------------------------------
paths:
  project:  "/home/labinfo/sherlock"
  scripts:  "/home/labinfo/sherlock/scripts"
  main:     "/home/labinfo/sherlock/main"

# ---------------------------------------------------------------------------
# CONDA ENVIRONMENTS
# ---------------------------------------------------------------------------
conda:
  main:  "sherlock"
  adapt: "adapt"

# ---------------------------------------------------------------------------
# TOOLS  (all in sherlock env unless noted)
# ---------------------------------------------------------------------------
tools:
  datasets:      "datasets"
  mafft:         "mafft"
  blastn:        "blastn"
  makeblastdb:   "makeblastdb"
  bowtie2:       "bowtie2"
  bowtie2_build: "bowtie2-build"
  seqkit:        "seqkit"
  rnaplfold:     "RNAplfold"
  primer3:       "primer3_core"
  primedrpa:     "PrimedRPA"
  snakemake:     "snakemake"

# ---------------------------------------------------------------------------
# THREADS
# ---------------------------------------------------------------------------
threads:
  default: 8
  max:     16

# ---------------------------------------------------------------------------
# M01 — GENOME DOWNLOAD
# ---------------------------------------------------------------------------
download:
  # Assembly levels to include
  assembly_levels:
    - "Complete Genome"
    - "Chromosome"
  require_gcf:    true     # for global set only (not Chilean)
  n_parallel:     4
  retries:        3

  # Anchor accessions — Chile-relevant references (always downloaded)
  # Refs: [3] Aguayo 2015 · [4] Plaza-Garrido 2016
  anchors:
    R20291_RT027:    "GCF_015732555.1"
    CD196_RT027:     "GCF_021378415.1"
    CD630Derm_RT012: "GCF_000953275.1"
    DSM27639_RT012:  "GCF_003313565.1"
    L_NTCD03_nontox: "GCF_951803555.1"

  # Chilean strains — all 12 available in NCBI (April 2026)
  # Downloaded regardless of assembly level or GCF/GCA status
  # Gene integrity verified via GFF flags (partial=true, pseudo=true) in M02
  # Conflict of interest note: GCA_049907XXX deposited by Daniel Paredes-Sabja
  # (declared in project proposal). Used as public NCBI data only.
  chilean_strains:
    PUC47:   "GCF_900744365.1"
    PUC51:   "GCF_900744445.1"
    PUC99:   "GCF_900744455.1"
    PUC347:  "GCF_900744495.1"
    PUC577:  "GCF_900744565.1"
    P12:     "GCA_049907315.1"
    PUC_256: "GCA_049907355.1"
    ICC5:    "GCA_049907385.1"
    PUC_606: "GCA_049907415.1"
    P8:      "GCA_049907465.1"
    PUC_90:  "GCA_049907515.1"
    PUC_75:  "GCA_049907605.1"

# Metadata fields for dataformat tsv genome
metadata_fields: "accession,assminfo-name,assminfo-level,assminfo-refseq-category,assminfo-bioproject,organism-tax-id,organism-name,ani-submitted-organism,assminfo-biosample-strain,assminfo-biosample-isolate,assminfo-biosample-accession,assminfo-biosample-host,assminfo-biosample-host-disease,assminfo-biosample-isolation-source,assminfo-biosample-geo-loc-name,assminfo-biosample-lat-lon,assminfo-biosample-collection-date,assminfo-biosample-collected-by,assminfo-biosample-submission-date,assminfo-sequencing-tech,assminfo-assembly-method,assmstats-number-of-scaffolds"

# Column names in TSV (used for filtering)
metadata_cols:
  accession:  "Assembly Accession"
  level:      "Assembly Level"
  scaffolds:  "Assembly Stats Number of Scaffolds"
  geo:        "Assembly BioSample Geographic location"
  host:       "Assembly BioSample Host"
  strain:     "Assembly BioSample Strain"

# ---------------------------------------------------------------------------
# M01b — UHGG  (downloaded when needed by M08)
# ---------------------------------------------------------------------------
uhgg:
  version:       "v2.0"
  ftp_base:      "https://ftp.ebi.ac.uk/pub/databases/metagenomics/mgnify_genomes/human-gut"
  n_parallel:    8
  exclude_cdiff: true

# ---------------------------------------------------------------------------
# M02 — FUNCTIONAL CLASSIFICATION  (Groups A / B / C)
# ---------------------------------------------------------------------------
classification:
  # Gene presence determined from GFF (gene= field)
  # Integrity determined from GFF flags: partial=true, pseudo=true
  target_genes: ["tcdA", "tcdB", "tcdC", "cdtA", "cdtB", "tpiA", "sodA", "16S"]
  groups:
    A:
      required:  ["tcdA", "tcdB", "cdtA", "cdtB"]
      tcdC_del:  true
      label:     "Hypervirulent_RT027"
      reaction:  "both"
    B:
      required:  ["tcdA", "tcdB"]
      absent:    ["cdtA", "cdtB"]
      tcdC_del:  false
      label:     "Toxigenic_RT012"
      reaction:  "A"
    C:
      absent:    ["tcdA", "tcdB"]
      label:     "NonToxigenic"
      reaction:  "offtarget"
  tcdC_del_bp:    18
  junction_flank: 20

# ---------------------------------------------------------------------------
# M03 — SEQUENCE EXTRACTION
# ---------------------------------------------------------------------------
extraction:
  utr_flank_nt: 50
  targets: ["tcdA", "tcdB", "tcdC", "cdtA", "cdtB", "tpiA", "rpoB"]
  # Only extract genes where partial=false AND pseudo=false in GFF
  skip_partial:   true
  skip_pseudogene: true

# ---------------------------------------------------------------------------
# M04 — MSA + CONSERVATION
# ---------------------------------------------------------------------------
alignment:
  tool:    "mafft"
  mode:    "auto"
  threads: 8
  conservation:
    shannon:  true
    trident:  true
    wilcoxon: true

# ---------------------------------------------------------------------------
# M05 — mRNA ACCESSIBILITY (RNAplfold)
# ---------------------------------------------------------------------------
accessibility:
  window:  80
  span:    40
  u_window: 28    # spacer length — R3 fix (was 1)
  min_acc: 0.01    # adjusted for -u 28 (Lorenz 2011); use relative ranking
  threads: 8

# ---------------------------------------------------------------------------
# M06 — crRNA DESIGN (CaSilico + ADAPT)
# ---------------------------------------------------------------------------
crna:
  spacer_len:    28
  gc_min:        0.25    # adapted for C. difficile 29% GC genome
  gc_max:        0.65
  polyu_max:     3
  u_frac_max:    0.50    # R7: total U fraction filter
  g_pos1_penalty: -0.05  # R6: G at position 1 reduces activity ~30-40%
  mfe_max:       -5.0
  slide_step:    1
  junction_mode: true
  # LwCas13a direct repeat — DO NOT CHANGE
  # Source: Gootenberg 2017 / Calderón 2024
  dr: "GGGGAUUUAGACUACCCCAAAAACGAAGGGGGGACUAAAAC"
  # Reaction design (Option C: two reactions, LwCas13a only)
  reaction_A:
    targets:  ["tcdA", "tcdB_clade2", "tcdB_clade1", "rpoB"]
    ortholog: "LwCas13a"
    reporter: "poly-U"
  reaction_B:
    targets:  ["tcdC_wt", "tcdC_junction", "cdtA", "cdtB", "tpiA"]
    ortholog: "LwCas13a"
    reporter: "poly-U"

# ---------------------------------------------------------------------------
# M07 — RT-RPA PRIMER CO-DESIGN (PrimedRPA)
# ---------------------------------------------------------------------------
primers:
  rpa_env:     "RPA"
  len_min:      30
  len_max:      35
  amplicon_min: 100
  amplicon_max: 200
  tm_min:       37.0
  tm_max:       42.0
  gc_min:       0.40
  gc_max:       0.60
  crna_margin:  10
  t7: "AATTCTAATACGACTCACTATAGG"

# ---------------------------------------------------------------------------
# M08 — SPECIFICITY
# ---------------------------------------------------------------------------
specificity:
  reject_identity: 80.0
  reject_coverage: 70.0
  evalue:          0.01
  ontarget_min:    0.90
  blastn_task:     "blastn-short"
  blastn_word:     7
  bowtie2_mode:    "--very-sensitive"
  bowtie2_mm:      3

# ---------------------------------------------------------------------------
# M09 — RANKING + REPORT
# ---------------------------------------------------------------------------
ranking:
  top_n:      5
  report_fmt: "html"
  weights:
    adapt_score:    0.35
    accessibility:  0.20
    conservation:   0.20
    specificity:    0.15
    discrimination: 0.10

# ---------------------------------------------------------------------------
# M10 — SYNTHETIC CONTROLS
# ---------------------------------------------------------------------------
synthetic:
  flank_nt:   100
  include_dr: true

# ---------------------------------------------------------------------------
# M11 — RT-qPCR PRIMERS (reference method)
# ---------------------------------------------------------------------------
rtqpcr:
  amplicon_min: 80
  amplicon_max: 200
  tm_target:    60.0
  tm_tol:        2.0
  gc_min:        0.45
  gc_max:        0.65
  targets: ["tcdA", "tcdB_clade1", "tcdB_clade2", "tcdC", "cdtA", "cdtB", "tpiA", "rpoB"]
