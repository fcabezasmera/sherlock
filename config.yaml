# =============================================================================
# config.yaml — SHERLOCK crRNA Design Pipeline · v1.0
# ~/sherlock/config.yaml
#
# To adapt for a different organism:
#   1. Update [organism]
#   2. Update [download] anchors
#   3. Update [classification] groups
#   4. Update [mlst] scheme + st_to_clade
# =============================================================================

# ---------------------------------------------------------------------------
# ORGANISM
# ---------------------------------------------------------------------------
organism:
  name:    "Clostridioides_difficile"
  display: "Clostridioides difficile"

# ---------------------------------------------------------------------------
# PATHS
# ---------------------------------------------------------------------------
paths:
  project:  "/home/labinfo/sherlock"
  scripts:  "/home/labinfo/sherlock/scripts"
  main:     "/home/labinfo/sherlock/main"
  bakta_db: "/home/labinfo/bakta_db/db"
  checkm2_db: "/home/labinfo/checkm2_db/CheckM2_database/uniref100.KO.1.dmnd"

# ---------------------------------------------------------------------------
# CONDA ENVIRONMENTS
# ---------------------------------------------------------------------------
conda:
  main:    "sherlock"
  bakta:   "bakta"
  checkm2: "checkm2"
  adapt:   "adapt"

# ---------------------------------------------------------------------------
# TOOLS
# ---------------------------------------------------------------------------
tools:
  datasets:      "datasets"
  efetch:        "efetch"
  mafft:         "mafft"
  blastn:        "blastn"
  makeblastdb:   "makeblastdb"
  bowtie2:       "bowtie2"
  bowtie2_build: "bowtie2-build"
  seqkit:        "seqkit"
  mlst:          "mlst"
  iqtree:        "iqtree"
  rnaplfold:     "RNAplfold"
  primer3:       "primer3_core"
  primedrpa:     "PrimedRPA"
  snakemake:     "snakemake"
  bakta:         "bakta"
  checkm2:       "checkm2"

# ---------------------------------------------------------------------------
# THREADS
# ---------------------------------------------------------------------------
threads:
  default: 8
  max:     16

# ---------------------------------------------------------------------------
# M01 — GENOME DOWNLOAD
# ---------------------------------------------------------------------------
download:
  assembly_level: "Complete Genome"
  max_scaffolds:  2
  require_gcf:    true
  n_parallel:     4
  retries:        3
  include_gff3:   true
  include_fna:    true

  # Anchor accessions — Chile-relevant references
  # Refs: [3] Aguayo 2015 · [4] Plaza-Garrido 2016
  anchors:
    R20291_RT027:    "GCF_015732555.1"
    CD196_RT027:     "GCF_021378415.1"
    CD630Derm_RT012: "GCF_000953275.1"
    DSM27639_RT012:  "GCF_003313565.1"
    L_NTCD03_nontox: "GCF_951803555.1"

# Metadata fields for dataformat tsv genome
metadata_fields: "accession,assminfo-name,assminfo-level,assminfo-refseq-category,assminfo-bioproject,organism-tax-id,organism-name,ani-submitted-organism,assminfo-biosample-strain,assminfo-biosample-isolate,assminfo-biosample-accession,assminfo-biosample-host,assminfo-biosample-host-disease,assminfo-biosample-isolation-source,assminfo-biosample-geo-loc-name,assminfo-biosample-lat-lon,assminfo-biosample-collection-date,assminfo-biosample-collected-by,assminfo-biosample-submission-date,assminfo-sequencing-tech,assminfo-assembly-method,assmstats-number-of-scaffolds"

# Column names in TSV (used for filtering)
metadata_cols:
  accession:  "Assembly Accession"
  level:      "Assembly Level"
  scaffolds:  "Assembly Stats Number of Scaffolds"
  geo:        "Assembly BioSample Geographic location"
  host:       "Assembly BioSample Host"
  strain:     "Assembly BioSample Strain"

# ---------------------------------------------------------------------------
# M01b — UHGG  (downloaded when needed by M12)
# ---------------------------------------------------------------------------
uhgg:
  version:       "v2.0"
  ftp_base:      "https://ftp.ebi.ac.uk/pub/databases/metagenomics/mgnify_genomes/human-gut"
  n_parallel:    8
  exclude_cdiff: true

# ---------------------------------------------------------------------------
# M02 — QC (CheckM2 only)
# ---------------------------------------------------------------------------
qc:
  min_completeness:  95.0   # % → exclusion criterion
  max_contamination:  2.0   # % → exclusion criterion

# ---------------------------------------------------------------------------
# M03 — MLST
# ---------------------------------------------------------------------------
mlst:
  scheme:       "cdifficile"
  min_identity: 95.0
  min_coverage: 90.0
  st_to_clade:
    "1":  "Clade_2"   # ST1  → RT027/NAP1  (ref [3] Chile 79%)
    "3":  "Clade_1"   # ST3  → RT001
    "11": "Clade_1"
    "37": "Clade_1"   # ST37 → RT046
    "54": "Clade_1"   # ST54 → RT012  (ref [4] Chile)

# ---------------------------------------------------------------------------
# M04 — BAKTA ANNOTATION
# ---------------------------------------------------------------------------
annotation:
  threads:        8
  min_contig_len: 200
  complete:       true

# ---------------------------------------------------------------------------
# M05 — FUNCTIONAL CLASSIFICATION  (Groups A / B / C)
# ---------------------------------------------------------------------------
classification:
  min_identity:   80.0
  min_coverage:   70.0
  tcdC_del_bp:    18
  junction_flank: 20
  groups:
    A:
      required:  ["tcdA", "tcdB", "cdtA", "cdtB"]
      tcdC_del:  true
      label:     "Hypervirulent_RT027"
      reaction:  "both"
    B:
      required:  ["tcdA", "tcdB"]
      absent:    ["cdtA", "cdtB"]
      tcdC_del:  false
      label:     "Toxigenic_RT012"
      reaction:  "A"
    C:
      absent:    ["tcdA", "tcdB"]
      label:     "NonToxigenic"
      reaction:  "offtarget"

# ---------------------------------------------------------------------------
# M06 — PSEUDOGENE CHECK
# ---------------------------------------------------------------------------
pseudogene:
  min_length_pct: 80.0   # % of reference length → flag as pseudogene if below
  min_identity:   80.0   # % blastn identity

# ---------------------------------------------------------------------------
# M07 — SEQUENCE EXTRACTION
# ---------------------------------------------------------------------------
extraction:
  utr_flank_nt: 50
  targets: ["tcdA", "tcdB", "tcdC", "cdtA", "cdtB", "tpiA", "sodA", "16S"]

# ---------------------------------------------------------------------------
# M08 — MSA + CONSERVATION
# ---------------------------------------------------------------------------
alignment:
  tool:    "mafft"
  mode:    "auto"
  threads: 8
  conservation:
    shannon:  true
    trident:  true
    wilcoxon: true
  adapt_mult:
    tcdA:  ["groupA", "groupB"]
    tcdB:  ["groupA", "groupB"]
    tpiA:  ["groupA", "groupB", "groupC"]
    sodA:  ["groupA", "groupB", "groupC"]
    "16S": ["groupA", "groupB", "groupC"]
  adapt_diff:
    tcdC_junction:
      on_target:  "groupA"
      off_target: "groupB"
    cdtA:
      on_target:  "groupA"
      off_target: "groupC"

# ---------------------------------------------------------------------------
# M09 — mRNA ACCESSIBILITY (RNAplfold)
# ---------------------------------------------------------------------------
accessibility:
  window:  80
  span:    40
  min_acc: 0.5

# ---------------------------------------------------------------------------
# M10 — crRNA DESIGN (CaSilico + ADAPT)
# ---------------------------------------------------------------------------
crna:
  spacer_len:    28
  gc_min:        0.30
  gc_max:        0.70
  polyu_max:     3
  mfe_max:       -5.0
  slide_step:    1
  junction_mode: true
  # LwCas13a direct repeat — DO NOT CHANGE
  # Source: Gootenberg 2017 / Calderón 2024
  dr: "GGGGAUUUAGACUACCCCAAAAACGAAGGGGGGACUAAAAC"

# ---------------------------------------------------------------------------
# M11 — RT-RPA PRIMER CO-DESIGN (PrimedRPA)
# ---------------------------------------------------------------------------
primers:
  len_min:      30
  len_max:      35
  amplicon_min: 100
  amplicon_max: 200
  tm_min:       37.0
  tm_max:       42.0
  gc_min:       0.40
  gc_max:       0.60
  crna_margin:  10
  # T7 promoter — Source: Gootenberg 2017 / Calderón 2024
  t7: "AATTCTAATACGACTCACTATAGG"
  # Option C: two reactions, both LwCas13a
  reaction_A:
    targets:  ["tcdB", "tcdA", "16S"]
    ortholog: "LwCas13a"
    reporter: "poly-U"
  reaction_B:
    targets:  ["cdtA", "cdtB", "tcdC_PAN", "tcdC_RT027jct", "tpiA", "sodA"]
    ortholog: "LwCas13a"
    reporter: "poly-U"

# ---------------------------------------------------------------------------
# M12 — SPECIFICITY
# ---------------------------------------------------------------------------
specificity:
  reject_identity: 80.0
  reject_coverage: 70.0
  evalue:          0.01
  ontarget_min:    0.90
  blastn_task:     "blastn-short"
  blastn_word:     7
  bowtie2_mode:    "--very-sensitive"
  bowtie2_mm:      3

# ---------------------------------------------------------------------------
# M13 — RANKING + REPORT
# ---------------------------------------------------------------------------
ranking:
  top_n:      5
  report_fmt: "html"
  weights:
    adapt_score:    0.35
    accessibility:  0.20
    conservation:   0.20
    specificity:    0.15
    discrimination: 0.10

# ---------------------------------------------------------------------------
# M14 — SYNTHETIC CONTROLS
# ---------------------------------------------------------------------------
synthetic:
  flank_nt:   100
  include_dr: true

# ---------------------------------------------------------------------------
# M15 — RT-qPCR PRIMERS (reference method)
# ---------------------------------------------------------------------------
rtqpcr:
  amplicon_min: 80
  amplicon_max: 200
  tm_target:    60.0
  tm_tol:        2.0
  gc_min:        0.45
  gc_max:        0.65
  targets: ["tcdA", "tcdB", "tcdC", "cdtA", "tpiA", "sodA"]

# ---------------------------------------------------------------------------
# M16 — FIGURES
# ---------------------------------------------------------------------------
figures:
  formats: ["svg", "pdf"]
  dpi:     300
  phylogeny:
    bootstrap:    1000
    model_select: true
